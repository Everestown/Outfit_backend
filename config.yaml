server:
  address: ":8080"
  env: "development"

database:
  url: "postgresql://postgres:postgres@localhost:5432/outfit?sslmode=disable"

redis:
  url: "redis://localhost:6379"

jwt:
  secret: "secret"

log:
  level: "info"

cors:
  allowed_origins:
    - "http://localhost:5173"

modules:
  enabled:
    auth: true
    products: true
    cart: true
    orders: true